        @font-face {
            font-family: 'jetbrainsMono';

        body {
            background-color: #0B0F19;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3External-link%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");

        .glass-surface {
            background: rgba(26, 34, 54, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(66, 71, 84, 0.3);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }

        .glow-primary {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .shimmer {
            position: relative;
            overflow: hidden;
        }
        .shimmer::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 25%,
                rgba(255, 255, 255, 0.03) 50%,
                transparent 75%
            );
            animation: shimmer-anim 6s infinite linear;
        }
        @keyframes shimmer-anim {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.glass-surface');
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Subtle parallax/tilt effect if within proximity
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (y - centerY) / 50;
            const rotateY = (centerX - x) / 50;

            if (x > -100 && x < rect.width + 100 && y > -100 && y < rect.height + 100) {
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            } else {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
            }
        });

        // Focus ring enhancement
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('opacity-100');
            });
        });
    </script>
